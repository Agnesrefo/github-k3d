name: Build, Push and Deploy to K3D
run-name: Build, Push and Deploy to K3D

on: [push]

env:
  IMAGE_NAME: "${{ secrets.DOCKER_USER }}/nginx-k3d"

jobs:
  build-push-image:
    runs-on: self-hosted
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Debug IMAGE_NAME
        run: echo "IMAGE_NAME=${{ env.IMAGE_NAME }}"

      - name: Build Image
        run: docker build -t "${{ env.IMAGE_NAME }}" .

      - name: List Image
        run: docker images

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Push Image
        run: docker push "${{ env.IMAGE_NAME }}"


  deploy-k3d:
    needs: build-push-image
    runs-on: self-hosted
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Debug IMAGE_NAME
        run: echo "IMAGE_NAME=${{ env.IMAGE_NAME }}"

      - name: Replace variables in template
        run: envsubst < webserver.yaml.template > webserver.yaml

      - name: Deploy deployment.yaml
        run: kubectl apply -f webserver.yaml

      - name: View deployment
        run: kubectl get deployments

      - name: Deploy service
        run: kubectl apply -f webserver-svc.yaml

      - name: View service
        run: kubectl get services
